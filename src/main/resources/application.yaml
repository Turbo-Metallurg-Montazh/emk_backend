spring:
  application:
    name: EMK-CRM_Project_backend

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  jpa:
    defer-datasource-initialization: false
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        connection:
          provider_disables_autocommit: false
        jdbc:
          time_zone: UTC

  mail:
    host: smtp.mail.ru
    port: 465
    username: ${SPRING_MAIL_USERNAME:no-reply@example.com}
    password: ${SPRING_MAIL_PASSWORD:change-me}
    protocol: smtps
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

security:
  jwt:
    token:
      secret-key: ${SECURITY_JWT_TOKEN_SECRET_KEY:change-me-change-me-change-me-change-me}
      expire-length: 3600000 # 1 hour

logging:
  level:
    root: INFO
    com.kindred.emkcrm_project_backend: INFO
    org.springframework: WARN
    org.hibernate: WARN
    com.zaxxer.hikari: WARN
    org.flywaydb: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  health:
    mail:
      enabled: false

external-api:
  kontur:
    api-key-header: X-Kontur-Apikey
    api-key: ${KONTUR_API_KEY:change-me}
    base-url: https://api-zakupki.kontur.ru

email:
  domain: mail.com
  activation-link: http://localhost:8080/api/activate?token=
  host-email: ${EMAIL_HOST:no-reply@example.com}
  login-url: https://turbo-metallurg-montazh.ru/login

activation:
  key: ${ACTIVATION_KEY:change-me-change-me-change-me-change-me} # must be >32 chars
  expiration-ms: 8640000   # 360000 * 24

pagination:
  items-on-page: 50

schedule:
  time: "0 53 8 * * ?"

format:
  date-time: "yyyy-MM-dd'T'HH:mm:ss.SSS'Z'"

public-ai:
  cloudflare:
    account-id: ${PUBLIC_AI_CF_ACCOUNT_ID:local-account-id}
    api-token: ${PUBLIC_AI_CF_API_TOKEN:local-api-token}
    model: ${PUBLIC_AI_CF_MODEL:@cf/openai/gpt-oss-120b}
  timeout-seconds: 60
