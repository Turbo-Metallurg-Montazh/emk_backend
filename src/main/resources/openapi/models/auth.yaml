components:
  schemas:
    LoginRequest:
      type: object
      properties:
        username:
          type: string
          description: Username пользователя. Можно передать username или email.
        email:
          type: string
          format: email
          description: Email пользователя. Можно передать email или username.
        password:
          type: string
      required: [password]

    UserRegistrationRequest:
      type: object
      properties:
        username:
          type: string
        email:
          type: string
        password:
          type: string
      required: [username, email, password]

    TokenResponse:
      type: object
      properties:
        token:
          type: string

    MessageResponse:
      type: object
      properties:
        message:
          type: string

    ErrorResponse:
      type: object
      properties:
        error:
          type: string

    AdminUserDto:
      type: object
      properties:
        username:
          type: string
        email:
          type: string
        roles:
          type: array
          items:
            type: string
        firstName:
          type: string
        middleName:
          type: string
          nullable: true
        lastName:
          type: string
        enabled:
          type: boolean
      required: [firstName, lastName, enabled]

    AdminCreateUserRequest:
      type: object
      properties:
        firstName:
          type: string
        middleName:
          type: string
          nullable: true
        lastName:
          type: string
        email:
          type: string
        roles:
          type: array
          items:
            type: string
      required: [firstName, lastName, email]

    SendPasswordResetLinkRequest:
      type: object
      properties:
        email:
          type: string
          format: email
      required: [email]

    PasswordResetConfirmRequest:
      type: object
      properties:
        token:
          type: string
        newPassword:
          type: string
      required: [token, newPassword]

    PermissionDto:
      type: object
      properties:
        code:
          type: string
        description:
          type: string
      required: [code]

    RoleDto:
      type: object
      properties:
        code:
          type: string
        name:
          type: string
        system:
          type: boolean
        permissions:
          type: array
          items:
            type: string
      required: [code, name, system, permissions]

    UpdateRolePermissionsRequest:
      type: object
      properties:
        permissions:
          type: array
          items:
            type: string
      required: [permissions]

    UpdateUserRolesRequest:
      type: object
      properties:
        roles:
          type: array
          items:
            type: string
      required: [roles]

    UpdateUserEnabledRequest:
      type: object
      properties:
        enabled:
          type: boolean
      required: [enabled]
