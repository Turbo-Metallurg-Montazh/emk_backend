openapi: 3.0.3
info:
  title: Corporate Authentication API
  version: 1.0.0
  description: >
    Аутентификация пользователей во внутренней корпоративной сети.
    Самостоятельная регистрация отключена; учетные записи создаются и управляются администраторами.

paths:
  # Аутентификация пользователя (корпоративная учетная запись)
  /login:
    $ref: "./contracts/auth/login.yaml#/login"

  /password-reset/confirm:
    $ref: "./contracts/auth/login.yaml#/passwordResetConfirm"

  # Эндпоинты панели администратора для управления пользователями
  /admin/users:
    $ref: "./contracts/auth/admin-users.yaml#/adminUsers"

  /admin/users/{username}:
    $ref: "./contracts/auth/admin-users.yaml#/adminUserByUsername"

  /admin/users/reset-password:
    $ref: "./contracts/auth/admin-users.yaml#/adminUserResetPassword"

  /admin/users/{username}/enabled:
    $ref: "./contracts/auth/admin-users.yaml#/adminUserEnabled"

  /admin/roles:
    $ref: "./contracts/auth/rbac-admin.yaml#/adminRoles"

  /admin/permissions:
    $ref: "./contracts/auth/rbac-admin.yaml#/adminPermissions"

  /admin/roles/{roleCode}/permissions:
    $ref: "./contracts/auth/rbac-admin.yaml#/adminRolePermissions"

  /admin/users/{username}/roles:
    $ref: "./contracts/auth/rbac-admin.yaml#/adminUserRoles"

  /public-ai/chat:
    $ref: "./contracts/openai/ask-ai.yaml#/ask-open-ai"
