login:
  post:
    tags: [Auth]
    summary: Login using username or email
    description: >
      Аутентификация по корпоративной учетной записи.
      Для входа можно передать username или email (в поле username или в поле email).
      Username формируется автоматически на основе ФИО сотрудника
      (например: m.nachinkin, m.a.nachinkin, m.a.nachinkin1).
    operationId: login

    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../../models/auth.yaml#/components/schemas/LoginRequest"

    responses:

      '200':
        description: Login successful
        content:
          application/json:
            schema:
              title: Login200Response
              allOf:
                - $ref: "../../models/auth.yaml#/components/schemas/TokenResponse"

      '401':
        description: Invalid login or password
        content:
          application/json:
            schema:
              title: Login401Response
              allOf:
                - $ref: "../../models/auth.yaml#/components/schemas/ErrorResponse"

      '423':
        description: User account is disabled
        content:
          application/json:
            schema:
              title: Login423Response
              allOf:
                - $ref: "../../models/auth.yaml#/components/schemas/ErrorResponse"

      '501':
        description: Not implemented
        content:
          application/json:
            schema:
              title: Login501Response
              allOf:
                - $ref: "../../models/auth.yaml#/components/schemas/MessageResponse"

passwordResetConfirm:
  post:
    tags: [Auth]
    summary: Confirm password reset by token
    operationId: confirmPasswordReset
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../../models/auth.yaml#/components/schemas/PasswordResetConfirmRequest"
    responses:
      '200':
        description: Password reset successful
        content:
          application/json:
            schema:
              allOf:
                - $ref: "../../models/auth.yaml#/components/schemas/MessageResponse"

      '400':
        description: Invalid request or expired token
        content:
          application/json:
            schema:
              allOf:
                - $ref: "../../models/auth.yaml#/components/schemas/ErrorResponse"

      '501':
        description: Not implemented
        content:
          application/json:
            schema:
              title: ConfirmPasswordReset501Response
              allOf:
                - $ref: "../../models/auth.yaml#/components/schemas/MessageResponse"
